name: Build check

# Quality gate only — Cloudflare Workers Builds handles the actual deploy on
# push to main. This just fails the PR if the docs don't build cleanly.
on:
  pull_request:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'overrides/**'
      - 'data/**'
      - 'scripts/**'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git-revision-date "last updated" is accurate

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Guard — no dead monorepo path literals
        run: |
          if grep -rnE 'apps/ios/|server/backend|server/supabase|server/site' docs --include='*.md'; then
            echo "::error::Dead pre-split monorepo path(s) in docs/. Repo-qualify to the split layout (lavasec-ios: / lavasec-infra: / lavasec-web:)."
            exit 1
          fi

      - name: Guard — no internal infra surface (public-doc hygiene)
        run: |
          # Public docs must not publish private-repo names, internal resource
          # ids, secret/var names, or workers.dev hosts. Genericize to roles;
          # describe behavior + the public api.lavasecurity.app endpoint instead.
          pat='lavasec-infra|lavasec-runner|lavasec-ios-internal|lavasec-android-internal|lavasec-prod|lavasec-dev|lavasec-help-feedback|LAVASEC_R2|HELP_FEEDBACK_DB|SUPABASE_SERVICE_ROLE_KEY|ADMIN_API_KEY|LINEAR_API_KEY|LINEAR_TRIAGE_TEAM_KEY|SLACK_TRIAGE_WEBHOOK_URL|PUBLIC_SUPABASE_DASHBOARD_ORIGIN|workers\.dev'
          if grep -rnE "$pat" docs --include='*.md'; then
            echo "::error::Internal infra surface in public docs (private-repo name / resource id / secret name). Genericize to roles."
            exit 1
          fi

      - name: Guard — translation completeness (locales not silently drifting)
        run: bash scripts/check-translations.sh

      - name: Guard — canonical blocklist catalog in sync (+ legal invariants)
        run: python3 scripts/build-catalog.py --check

      - name: Build (strict — fails on broken links)
        run: mkdocs build --strict
