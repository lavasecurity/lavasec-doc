name: Build check

# Quality gate only — Cloudflare Workers Builds handles the actual deploy on
# push to main. This just fails the PR if the docs don't build cleanly.
on:
  pull_request:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'overrides/**'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git-revision-date "last updated" is accurate

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build (strict — fails on broken links)
        run: mkdocs build --strict
